<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/layout-fix.css') }}" rel="stylesheet">
<link href="{{ url_for('static', filename='css/unified-theme.css') }}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body{
            font-family:'Poppins',sans-serif;
            background:
                radial-gradient(circle at 10% 0%, #dff3ff 0%, transparent 35%),
                radial-gradient(circle at 90% 15%, #ffe8d8 0%, transparent 30%),
                linear-gradient(180deg,#edf5ff 0%,#f7fbff 100%);
            min-height:100vh;
        }
        .panel{
            border:1px solid #d4e2ff;
            border-radius:16px;
            background:#fff;
            box-shadow:0 14px 32px rgba(17,59,109,.08);
        }
    </style>
</head>
<body>
<div class="container py-5">
    <h2 class="mb-4">Admin Dashboard</h2>
    <div class="row g-3">
        <div class="col-md-6">
            <div class="panel p-4">
                <h5>Total Students</h5>
                <h2>{{ total_students }}</h2>
            </div>
        </div>
        <div class="col-md-6">
            <div class="panel p-4">
                <h5>Total Staff</h5>
                <h2>{{ total_staff }}</h2>
            </div>
        </div>
    </div>
</div>
<script src="{{ url_for('static', filename='js/unified-effects.js') }}"></script>
</body>
</html>
