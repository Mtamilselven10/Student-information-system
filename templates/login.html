<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Academic Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/layout-fix.css') }}" rel="stylesheet">
<link href="{{ url_for('static', filename='css/unified-theme.css') }}" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            background: linear-gradient(-45deg, #99cdd8, #daebe3, #fde8d3, #f1b9a4,  #cfd6c4,  #4b564c);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        body::before,
        body::after {
            content: "";
            position: fixed;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            filter: blur(12px);
            opacity: .35;
            z-index: 0;
            animation: orbFloat 8s ease-in-out infinite;
        }
        body::before {
            background: #fcd9b6;
            top: -80px;
            left: -70px;
        }
        body::after {
            background: #fff3e4;
            bottom: -90px;
            right: -90px;
            animation-delay: 1.2s;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
            animation: fadeIn 0.8s ease-in-out, cardFloat 5s ease-in-out infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-control {
            border-radius: 10px;
            height: 45px;
            transition: transform .25s ease, box-shadow .25s ease;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #131415;
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(11, 11, 11, 0.25);
        }

        .btn-custom {
            background: linear-gradient(45deg, #d2945a, #ffefa9);
            border: none;
            color: rgb(255, 255, 255);
            font-weight: 500;
            height: 45px;
            border-radius: 10px;
            transition: 0.4s;
        }

        .btn-custom:hover {
            transform: scale(1.03);
            background: linear-gradient(45deg, #68696c, #f9f4ff);
        }
        .btn-custom.loading {
            position: relative;
            pointer-events: none;
            opacity: .9;
            color: transparent;
        }
        .btn-custom.loading::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            width: 18px;
            height: 18px;
            margin-left: -9px;
            margin-top: -9px;
            border: 2px solid rgba(255,255,255,.65);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        .page-exit .login-card {
            animation: pageOut .42s ease forwards;
        }

        .title {
            font-weight: 600;
            color: #2a5298;
        }

        .register-link a {
            text-decoration: none;
            font-weight: 500;
            color: #2a5298;
        }

        .register-link a:hover {
            color: #00c6ff;
        }

        .error-text {
            font-size: 13px;
            color: red;
            display: none;
        }

        .flash-message {
            font-size: 14px;
        }

        .toggle-password {
            cursor: pointer;
            font-size: 14px;
            color: #2a5298;
            margin-top: 5px;
        }

        .toggle-password:hover {
            color: #00c6ff;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(10px, 14px); }
        }
        @keyframes cardFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
        }
        @keyframes pageOut {
            from { opacity: 1; transform: scale(1) translateY(0); }
            to { opacity: 0; transform: scale(.96) translateY(10px); }
        }
    </style>
</head>
<body>

<div class="login-card">
    <h3 class="text-center mb-4 title">Welcome Back 👋</h3>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="alert alert-danger flash-message">
                {{ messages[0] }}
            </div>
        {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}" id="loginForm">

        <!-- Email -->
        <div class="mb-3">
            <label>Email Address</label>
            <input type="email" name="email" class="form-control" id="email" required>
            <div class="error-text" id="emailError">Enter valid email</div>
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label>Password</label>
            <input type="password" name="password" class="form-control" id="password" required>
            <div class="toggle-password" onclick="togglePassword(event)">Show Password</div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-custom w-100">
            Login
        </button>

        <div class="text-center mt-3 register-link">
            Don't have an account?
            <a href="{{ url_for('register') }}">Register</a>
        </div>

    </form>

    {% if show_forgot %}
    <div class="mt-3 p-3 border rounded">
        <div class="fw-semibold mb-2">Forgot Password</div>
        <form method="POST" action="{{ url_for('forgot_password') }}">
            <input type="email" name="email" class="form-control mb-2" placeholder="Email" value="{{ forgot_email or '' }}" required>
            <input type="password" name="new_password" class="form-control mb-2" placeholder="New Password" required>
            <input type="password" name="confirm_password" class="form-control mb-2" placeholder="Confirm Password" required>
            <button type="submit" class="btn btn-outline-primary btn-sm w-100">Reset Password</button>
        </form>
    </div>
    {% endif %}
</div>

<script>
    const form = document.getElementById("loginForm");
    const email = document.getElementById("email");

    form.addEventListener("submit", function(e){
        const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
        if(!email.value.match(emailPattern)){
            document.getElementById("emailError").style.display = "block";
            e.preventDefault();
        } else {
            document.getElementById("emailError").style.display = "none";
            e.preventDefault();
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.classList.add("loading");
            submitBtn.disabled = true;
            document.body.classList.add("page-exit");
            setTimeout(() => form.submit(), 420);
        }
    });

    function togglePassword(event){
        const password = document.getElementById("password");
        if(password.type === "password"){
            password.type = "text";
            event.target.innerText = "Hide Password";
        } else {
            password.type = "password";
            event.target.innerText = "Show Password";
        }
    }
</script>

<script src="{{ url_for('static', filename='js/unified-effects.js') }}"></script>
</body>
</html>
