<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/layout-fix.css') }}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body{
            font-family:'Poppins',sans-serif;
            background:
                radial-gradient(circle at 10% 0%, #dff3ff 0%, transparent 35%),
                radial-gradient(circle at 90% 15%, #ffe8d8 0%, transparent 30%),
                linear-gradient(180deg,#edf5ff 0%,#f7fbff 100%);
            min-height:100vh;
        }
        .panel{
            border:1px solid #d4e2ff;
            border-radius:16px;
            background:#fff;
            box-shadow:0 14px 32px rgba(17,59,109,.08);
        }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="panel p-4">
        <h2 class="mb-3">Staff Dashboard</h2>
        <a href="{{ url_for('add_student') }}" class="btn btn-primary btn-sm mb-3">Add Student</a>
        <h5>All Students</h5>
        {% for student in students %}
            <p class="mb-1">{{ student.name }} - {{ student.register_number }}</p>
        {% endfor %}
    </div>
</div>
</body>
</html>
