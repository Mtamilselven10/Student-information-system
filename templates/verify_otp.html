<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify OTP | Academic Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/layout-fix.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/unified-theme.css') }}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            background: linear-gradient(-45deg, #852aa7, #c5d6f3, #eaa5ff, #cbeff5);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .otp-card {
            width: 100%;
            max-width: 480px;
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
        }
        .form-control {
            border-radius: 10px;
            height: 45px;
        }
        .btn-custom {
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            border: none;
            color: #fff;
            font-weight: 500;
            height: 45px;
            border-radius: 10px;
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>
<div class="otp-card">
    <h3 class="text-center mb-3" style="color: #2a5298; font-weight: 600;">Verify OTP</h3>
    <p class="text-center text-muted mb-4">Enter the 6-digit OTP sent to your email.</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-info py-2" style="font-size: 14px;">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('verify_otp') }}">
        <div class="mb-3">
            <label class="form-label">OTP</label>
            <input type="text" name="otp" class="form-control" maxlength="6" minlength="6" pattern="[0-9]{6}" required>
        </div>
        <button type="submit" class="btn btn-custom w-100">Verify OTP</button>
        <div class="text-center mt-3">
            <a href="{{ url_for('register') }}" style="text-decoration: none; color: #2a5298; font-weight: 500;">Back to Register</a>
        </div>
    </form>
</div>
<script src="{{ url_for('static', filename='js/unified-effects.js') }}"></script>
</body>
</html>
