<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Academic Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/layout-fix.css') }}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            background: linear-gradient(-45deg, #852aa7, #c5d6f3, #71a5fe, #cbeff5);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        body::before,
        body::after {
            content: "";
            position: fixed;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            filter: blur(12px);
            opacity: .35;
            z-index: 0;
            animation: orbFloat 8s ease-in-out infinite;
        }
        body::before {
            background: #bb8cff;
            top: -85px;
            left: -70px;
        }
        body::after {
            background: #8ee7ff;
            bottom: -95px;
            right: -80px;
            animation-delay: 1.2s;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .register-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
            animation: fadeIn 0.8s ease-in-out, cardFloat 5s ease-in-out infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-control, .form-select {
            border-radius: 10px;
            height: 45px;
            transition: transform .25s ease, box-shadow .25s ease;
            width: 100%;
            display: block;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
        }
        .register-card form .mb-3,
        .register-card form .mb-4 {
            text-align: left;
        }
        .form-control:focus, .form-select:focus {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(79, 172, 254, .25);
        }

        .btn-custom {
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            border: none;
            color: white;
            font-weight: 500;
            height: 45px;
            border-radius: 10px;
            transition: 0.4s;
        }

        .btn-custom:hover {
            transform: scale(1.03);
            background: linear-gradient(45deg, #667eea, #764ba2);
        }
        .btn-custom.loading {
            position: relative;
            pointer-events: none;
            opacity: .9;
            color: transparent;
        }
        .btn-custom.loading::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            width: 18px;
            height: 18px;
            margin-left: -9px;
            margin-top: -9px;
            border: 2px solid rgba(255,255,255,.65);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        .page-exit .register-card {
            animation: pageOut .42s ease forwards;
        }

        .error-text {
            font-size: 13px;
            color: red;
            display: none;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(10px, 14px); }
        }
        @keyframes cardFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
        }
        @keyframes pageOut {
            from { opacity: 1; transform: scale(1) translateY(0); }
            to { opacity: 0; transform: scale(.96) translateY(10px); }
        }
    </style>
</head>
<body>

<div class="register-card">
    <h3 class="text-center mb-4" style="color: #2a5298; font-weight: 600;">Create Account</h3>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-info py-2" style="font-size: 14px;">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('register') }}" id="registerForm">

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-control" id="email" required>
            <div class="error-text" id="emailError">Invalid email format</div>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" id="password" required>
            <div class="error-text" id="passwordError">Password must be at least 6 characters</div>
        </div>

        <div class="mb-4">
            <label class="form-label">Select Role</label>
            <select name="role" class="form-select" required>
                <option value="">-- Select Role --</option>
                <option value="Staff">Staff</option> 
                <option value="Student">Student</option>
    
            </select>
        </div>

        <button type="submit" class="btn btn-custom w-100">Register</button>

        <div class="text-center mt-3">
            Already have an account? <a href="{{ url_for('login') }}" style="text-decoration: none; color: #2a5298; font-weight: 500;">Login</a>
        </div>
    </form>
</div>

<script>
    const form = document.getElementById("registerForm");
    const email = document.getElementById("email");
    const password = document.getElementById("password");

    form.addEventListener("submit", function(e){
        let valid = true;
        const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

        if(!email.value.match(emailPattern)){
            document.getElementById("emailError").style.display = "block";
            valid = false;
        } else {
            document.getElementById("emailError").style.display = "none";
        }

        if(password.value.length < 6){
            document.getElementById("passwordError").style.display = "block";
            valid = false;
        } else {
            document.getElementById("passwordError").style.display = "none";
        }

        if(!valid) {
            e.preventDefault();
            return;
        }

        e.preventDefault();
        const submitBtn = form.querySelector('button[type="submit"]');
        submitBtn.classList.add("loading");
        submitBtn.disabled = true;
        document.body.classList.add("page-exit");
        setTimeout(() => form.submit(), 420);
    });
</script>

</body>
</html>
